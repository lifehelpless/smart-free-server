#############################################################################################################
#                                                                                                           #
# 为了减少重复配置，本配置文件为此sa-admin的独有配置，更多配置请查看 sa-base 项目中的 sa-base.yaml 通用配置文件。      #
# 其中此文件中配置可以覆盖 sa-base.yaml 中的通用配置，具体实现类请看类：YamlProcessor.java                          #
#                                                                                                           #
#############################################################################################################

# 项目配置: 名称、日志目录
project:
  name: sa-admin
  log-directory: ${localPath:/home}/logs/smart_admin_v3/${project.name}/${spring.profiles.active}

# 项目端口和url根路径
server:
  port: 1024
  servlet:
    context-path: /

# 环境
spring:
  profiles:
    active: '@profiles.active@'

#免费服务器地址 配置示例 配置多个别忘了copy "-"
#username： 账号， password： 密码， type： 0 阿贝云， 1三丰云
cloudServers:
  -
    username: 13111001111
    password: 123456789
    type: 0
    enable: false
  -
    username: 13523617506
    password: long19980101.
    type: 1
    enable: true
#  -
#    username: 13111001111
#    password: 123456789
#    type: 1


#邮箱配置
mailInfo:
  #邮件服务器  作者使用的QQ邮箱，
  serverHost: smtp.qq.com
  serverPort: 465
  username: 123456789@qq.com
  #使用QQ邮箱注意,这里的密码并不是QQ邮箱密码  需要自己开启smtp服务器,QQ邮箱会给你一串密码
  password: bpmgyuujdcpcjfbb
  #收件人邮箱  这里我用的QQ邮箱,关注公众号,微信可以直接收到通知
  receiveUser: 123456789@qq.com


#博客配置 GitHub 个人博客
blogInfo:
  #这里提供了一个公共的(新注册了一个账号搭建的,怕把我原来的给封了💩️)
  #推荐使用自己搭建的GitHub Pages 多个博客文件同时提交,格式化为html可能用时较久  导致程序超时从而延期失败
  #格式: git@github.com:{用户名}/{用户名(全为小写)}.github.io.git
  uri: git@github.com:Demo-AD/demo-ad.github.io.git
  #仓库拉取到本地时的路径
  localPath: /freeServer/repo
  #如果使用我提供的GitHub Pages,这里最好填写你的github用户名 可以防止发布文章地址冲突
  username: Demo-Liu

#PhantomJs 配置项
phantomJs:
  #phantomJs 路径  windows 和 Linux x86_64已经嵌入了项目,其它系统请自行配置此项
  phantomJsExec:
  #图片生成路径
  picPath: /freeServer/phantomJsPic/postpone.png

#系统配置
#博客初始化等待次数 如果使用作者提供的公用仓库, 最好把初始化等待时间调大一点  建议为半小时以内
blogInitWaitCount: 10
#博客初始化等待时间(分钟)
blogInitWaitTime: 1

#资源文件提取路径
resourceTempFilePath: /freeServer/resource
